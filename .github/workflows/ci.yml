name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1-5"

jobs:
  cache-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Zenoh-C dependencies
        uses: ./.github/actions/build-zenoh-c
        with:
          install-prefix: "/tmp/local"

  build:
    name: Build examples
    needs: cache-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Zenoh-C dependencies
        uses: ./.github/actions/build-zenoh-c
        with:
          install-prefix: "/tmp/local"

      - name: Install dependencies
        run: make deps

      - name: Build all examples
        run: |
          export CGO_CFLAGS="-I/tmp/local/include"
          export CGO_LDFLAGS="-L/tmp/local/lib"
          export BIN_DIR="/tmp/local/bin"
          make

  test:
    name: Run tests
    needs: cache-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Zenoh-C dependencies
        uses: ./.github/actions/build-zenoh-c
        with:
          install-prefix: "/tmp/local"

      - name: Run tests
        run: |
          export CGO_CFLAGS="-I/tmp/local/include"
          export CGO_LDFLAGS="-L/tmp/local/lib"
          export LD_LIBRARY_PATH="/tmp/local/lib"
          make test 

  test_examples:
    name: Run examples test 
    needs: build 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Zenoh-C dependencies
        uses: ./.github/actions/build-zenoh-c
        with:
          install-prefix: "/tmp/local"

      - name: Run test_examples
        run: |
          export LD_LIBRARY_PATH="/tmp/local/lib"
          export BIN_DIR="/tmp/local/bin"
          chmod a+x ${BIN_DIR}/*
          make test_examples

  test_examples_quic:
    name: Run examples test with QUIC transport
    needs: build 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Zenoh-C dependencies
        uses: ./.github/actions/build-zenoh-c
        with:
          install-prefix: "/tmp/local"

      - name: Run test_examples_quic
        run: |
          export LD_LIBRARY_PATH="/tmp/local/lib"
          export BIN_DIR="/tmp/local/bin"
          chmod a+x ${BIN_DIR}/*
          make test_examples_quic

  fmt:
    name: Check code format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Check code format
        run: make fmt
